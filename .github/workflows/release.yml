name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyml derives version from the
          # VERSION file — VERSION is the single source of truth. Resolve
          # the template to the file content for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || { echo "cyrius.cyml ($CYML_RAW) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyml: $CYML_RAW)"

      - name: Install Cyrius toolchain
        # Version derived from cyrius.cyml's [package].cyrius pin (CLAUDE.md
        # hard rule: never hardcode the toolchain version in CI YAML).
        run: |
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Vet — freestanding core must have ZERO deps
        # Re-assert the headline invariant (ADR 0001) at release time: the
        # font_data.cyr asset we ship is what the agnos kernel includes, so
        # it must carry no dependency.
        run: |
          out="$(cyrius vet src/font_data.cyr 2>&1)"
          echo "$out"
          echo "$out" | grep -q "no dependencies" || { echo "FAIL: src/font_data.cyr gained a dependency"; exit 1; }

      - name: Build demo (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/kashi
          echo "kashi demo: $(wc -c < build/kashi) bytes"

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rm -f kashi-*.tar.gz kashi-*-font_data.cyr
          git archive --format=tar.gz --prefix="kashi-${TAG}/" -o "kashi-${TAG}-src.tar.gz" HEAD
          # Ship the freestanding core as a standalone, version-stamped
          # asset — kernels `include` this file directly (ADR 0001).
          cp src/font_data.cyr "kashi-${TAG}-font_data.cyr"
          sha256sum kashi-*.tar.gz kashi-*-font_data.cyr build/kashi > SHA256SUMS

      - name: Extract changelog
        run: |
          awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "kashi ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            kashi-*-src.tar.gz
            kashi-*-font_data.cyr
            build/kashi
            SHA256SUMS
